services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8nforge-preboot:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ../../..:/workspace
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_OWNER_PASSWORD: ${N8N_OWNER_PASSWORD:-}
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile 2>/dev/null || pnpm install &&
             pnpm build &&
             node packages/cli/dist/cli.js bootstrap --phase pre-boot
             -f examples/docker-local/n8nforge.yaml --state-dir /workspace/.n8nforge"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.17.0}
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    env_file:
      - ../../../.n8nforge/generated.env
    environment:
      DB_POSTGRESDB_HOST: postgres
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      n8nforge-preboot:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  n8nforge-postboot:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ../../..:/workspace
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_OWNER_PASSWORD: ${N8N_OWNER_PASSWORD:-}
      N8NFORGE_INSTANCE_URL: http://n8n:5678
    command: >
      sh -c "corepack enable && pnpm install --frozen-lockfile 2>/dev/null || pnpm install &&
             pnpm build &&
             node packages/cli/dist/cli.js bootstrap --phase post-boot
             -f examples/docker-local/n8nforge.yaml --state-dir /workspace/.n8nforge"
    depends_on:
      n8n:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  n8n_data:
