{{- if .Values.database.internal }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "n8nforge.fullname" . }}-postgres
  labels:
    {{- include "n8nforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "n8nforge.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "n8nforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "n8nforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8nforge.fullname" . }}-secrets
                  key: DB_POSTGRESDB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.database.user | quote }}, "-d", {{ .Values.database.name | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "n8nforge.fullname" . }}-postgres
  labels:
    {{- include "n8nforge.labels" . | nindent 4 }}
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    {{- include "n8nforge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
