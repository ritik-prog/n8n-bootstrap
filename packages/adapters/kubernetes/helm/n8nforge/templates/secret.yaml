apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8nforge.fullname" . }}-secrets
  labels:
    {{- include "n8nforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  N8N_ENCRYPTION_KEY: {{ required "secrets.encryptionKey is required" .Values.secrets.encryptionKey | quote }}
  N8N_USER_MANAGEMENT_JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  N8N_INSTANCE_OWNER_PASSWORD_HASH: {{ include "n8nforge.ownerPasswordHash" . | quote }}
  DB_POSTGRESDB_PASSWORD: {{ include "n8nforge.dbPassword" . | quote }}
  N8N_OWNER_PASSWORD: {{ required "owner.password is required for post-boot" .Values.owner.password | quote }}
